version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 10 # Fallback cooldown if no specific rule applies

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 10 # Fallback cooldown if no specific rule applies
    labels:
      - "maintenance"
