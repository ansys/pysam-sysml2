name: Labeler
on:
  pull_request:
    # opened, reopened, and synchronize are default for pull_request
    # edited - when PR title or body is changed
    # labeled - when labels are added to PR
    types: [opened, reopened, synchronize, edited, labeled]
  push:
    branches: [ main ]
    paths:
      - '../labels.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  label-syncer:
    name: Syncer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: micnncim/action-label-syncer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  labeler:
    name: Set labels
    needs: [label-syncer]
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:

    # Label based on modified files
    - name: Label based on changed files
      uses: actions/labeler@v5
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"

    # Label based on branch name
    - uses: actions-ecosystem/action-add-labels@v1
      if: |
        startsWith(github.event.pull_request.head.ref, 'doc') ||
        startsWith(github.event.pull_request.head.ref, 'docs')
      with:
        labels: documentation

    - uses: actions-ecosystem/action-add-labels@v1
      if: |
        startsWith(github.event.pull_request.head.ref, 'maint') ||
        startsWith(github.event.pull_request.head.ref, 'no-ci') ||
        startsWith(github.event.pull_request.head.ref, 'ci')
      with:
        labels: maintenance

    - uses: actions-ecosystem/action-add-labels@v1
      if: startsWith(github.event.pull_request.head.ref, 'feat')
      with:
        labels: |
          enhancement

    - uses: actions-ecosystem/action-add-labels@v1
      if: |
        startsWith(github.event.pull_request.head.ref, 'fix') ||
        startsWith(github.event.pull_request.head.ref, 'patch')
      with:
        labels: bug

  commenter:
    runs-on: ubuntu-latest
    steps:
    - name: Suggest to add labels
      uses: peter-evans/create-or-update-comment@v4
      # Execute only when no labels have been applied to the pull request
      if: toJSON(github.event.pull_request.labels.*.name) == '{}'
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Please add one of the following labels to add this contribution to the Release Notes :point_down:
          - [bug](https://github.com/ansys/ansys-templates/pulls?q=label%3Abug+)
          - [documentation](https://github.com/ansys/ansys-templates/pulls?q=label%3Adocumentation+)
          - [enhancement](https://github.com/ansys/ansys-templates/pulls?q=label%3Aenhancement+)
          - [good first issue](https://github.com/ansys/ansys-templates/pulls?q=label%3Agood+first+issue)
          - [maintenance](https://github.com/ansys/ansys-templates/pulls?q=label%3Amaintenance+)
          - [release](https://github.com/ansys/ansys-templates/pulls?q=label%3Arelease+)

  changelog-fragment:
    name: "Create changelog fragment"
    needs: [labeler]
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

    - name: Prepare towncrier environment
      run: |
        # Fixer les permissions
        chmod 664 pyproject.toml

        # Créer les répertoires nécessaires
        mkdir -p doc/changelog.d
        mkdir -p doc/source

        # Créer le fichier changelog s'il n'existe pas
        touch doc/source/changelog.rst
        chmod 664 doc/source/changelog.rst

        # Vérifier que Python peut écrire dans pyproject.toml
        python3 -c "
        import pathlib
        try:
            with open('pyproject.toml', 'r+') as f:
                content = f.read()
                print('✓ Can read/write pyproject.toml')
        except Exception as e:
            print('✗ Error with pyproject.toml:', e)
            exit(1)
        "

        # Vérifier la configuration towncrier existante
        python3 -c "
        import tomllib
        try:
            with open('pyproject.toml', 'rb') as f:
                config = tomllib.load(f)
                towncrier_config = config.get('tool', {}).get('towncrier', {})
                if towncrier_config:
                    print('✓ Towncrier configuration found')
                    print('  Package:', towncrier_config.get('package'))
                    print('  Directory:', towncrier_config.get('directory'))
                    print('  Filename:', towncrier_config.get('filename'))
                    print('  Template:', towncrier_config.get('template'))
                else:
                    print('✗ No towncrier configuration found in pyproject.toml')
                    exit(1)
        except Exception as e:
            print('✗ Error loading towncrier config:', e)
            exit(1)
        "

    - name: Generate changelog fragment
      uses: ansys/actions/doc-changelog@v10
      with:
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        use-conventional-commits: true
        use-default-towncrier-config: false
        bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
        bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}