  changelog-fragment:
    name: "Create changelog fragment"
    needs: [labeler]
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install towncrier==23.11.0 tomli

    - name: Create changelog fragment (Ansys workaround)
      run: |
        # Extract pull request information
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"

        echo "Processing PR #$PR_NUMBER: $PR_TITLE"

        # Create changelog directory if it doesn't exist
        mkdir -p doc/changelog.d

        # Initialize section and title variables
        SECTION="miscellaneous"  # default fallback value
        CLEAN_TITLE="$PR_TITLE"

        # Check if pull request uses conventional commit format
        if echo "$PR_TITLE" | grep -q ":"; then
          CC_TYPE=$(echo "$PR_TITLE" | cut -d':' -f1 | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          CLEAN_TITLE=$(echo "$PR_TITLE" | cut -d':' -f2- | sed 's/^ *//')

          echo "Detected conventional commit type: $CC_TYPE"

          # Map conventional commit types to changelog sections following Ansys conventions
          case "$CC_TYPE" in
            "feat") SECTION="added" ;;
            "fix") SECTION="fixed" ;;
            "docs") SECTION="miscellaneous" ;;
            "build") SECTION="dependencies" ;;
            "revert") SECTION="miscellaneous" ;;
            "style") SECTION="miscellaneous" ;;
            "refactor") SECTION="miscellaneous" ;;
            "perf") SECTION="miscellaneous" ;;
            "test") SECTION="miscellaneous" ;;
            "chore") SECTION="miscellaneous" ;;
            "ci") SECTION="miscellaneous" ;;
            *) SECTION="miscellaneous" ;;
          esac
        else
          # No conventional commit format detected, fallback to label-based categorization
          echo "No conventional commit detected, checking labels..."
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q "enhancement"; then
            SECTION="added"
          elif echo "$LABELS" | grep -q "bug"; then
            SECTION="fixed"
          elif echo "$LABELS" | grep -q "documentation"; then
            SECTION="miscellaneous"
          elif echo "$LABELS" | grep -q "testing"; then
            SECTION="miscellaneous"
          elif echo "$LABELS" | grep -q "dependencies"; then
            SECTION="dependencies"
          elif echo "$LABELS" | grep -q "CI/CD" || echo "$LABELS" | grep -q "maintenance"; then
            SECTION="miscellaneous"
          else
            SECTION="miscellaneous"
          fi
        fi

        # Clean and format the title - capitalize first letter
        CLEAN_TITLE=$(echo "$CLEAN_TITLE" | sed 's/^./\U&/')

        # Escape special characters for changelog compatibility
        CLEAN_TITLE=$(echo "$CLEAN_TITLE" | sed 's/`/\\`/g' | sed 's/"/\\"/g')

        # Create the changelog fragment file
        FRAGMENT_FILE="doc/changelog.d/${PR_NUMBER}.${SECTION}"
        echo "$CLEAN_TITLE" > "$FRAGMENT_FILE"

        echo "Created changelog fragment:"
        echo "  File: $FRAGMENT_FILE"
        echo "  Section: $SECTION"
        echo "  Content: $CLEAN_TITLE"

        # Verify fragment content
        echo "Fragment content verification:"
        cat "$FRAGMENT_FILE"

    - name: Commit and push changelog fragment
      run: |
        # Configure git with bot credentials
        git config user.name "${{ secrets.PYANSYS_CI_BOT_USERNAME }}"
        git config user.email "${{ secrets.PYANSYS_CI_BOT_EMAIL }}"

        # Stage the changelog fragment
        git add doc/changelog.d/

        # Check if there are changes to commit
        if ! git diff --staged --quiet; then
          echo "Committing changelog fragment..."
          git commit -m "Add changelog fragment for PR #${{ github.event.pull_request.number }}

          Type: conventional commit or label-based
          Section: $SECTION
          Title: $CLEAN_TITLE"

          # Push changes to the pull request branch
          git push origin HEAD:${{ github.head_ref }}
          echo "Changelog fragment committed and pushed successfully"
        else
          echo "No changelog fragment changes to commit"
        fi